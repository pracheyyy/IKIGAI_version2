<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Daily Ikigai Challenge</title>

<link rel="stylesheet" href="css/challenge.css">

</head>

<body>

<div class="challenge-header">

<h1>Daily Ikigai Challenge 🌱</h1>
<p>Total time: ~30 minutes</p>

<a href="history.html" class="history-btn">
📊 My Progress
</a>

</div>


<div class="challenge-container">


<div class="challenge-card">

<h2>1️⃣ Passion (10 min)</h2>
<p>Do something you love</p>

<label class="task-box">

<input type="checkbox" id="passionTask">

Spend 10 minutes doing a hobby you enjoy

</label>

</div>



<div class="challenge-card">

<h2>2️⃣ Skill (10 min)</h2>
<p>Grow your abilities</p>

<label class="task-box">

<input type="checkbox" id="skillTask">

Solve 2 coding problems / learn 1 concept

</label>

</div>



<div class="challenge-card">

<h2>3️⃣ Purpose / Profession (10 min)</h2>
<p>Connect with the world</p>

<label class="task-box">

<input type="checkbox" id="purposeTask">

Research one company or help someone with a doubt

</label>

</div>


</div>


<div class="done-container">

<button onclick="completeChallenge()" class="done-btn">

DONE with Challenge!

</button>

</div>


<script src="js/challenge.js"></script>

</body>

</html>
